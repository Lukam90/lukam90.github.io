triplets:
	- episode: 1D - L’incarnation,
	  description: Douleur pour saint Joseph de voir la Vierge Marie, son épouse, enceinte sans connaître la raison

	- episode: 1J - L’incarnation,
	  description: Joie d'apprendre de l'archange Gabriel la conception divine en Marie du Sauveur

	- episode: 2D - La nativité,
	  description: Douleur du départ précipité de Nazareth et de la pauvreté de la crèche

	- episode: 2J - La nativité,
	  description: Joie de la naissance de l'enfant Jésus et de le recevoir dans ses bras 

	- episode: 3D - La circoncision,
	  description: Douleur pour Marie et Joseph de voir la première goutte de sang de Jésus couler à cette occasion

	- episode: 3J - La circoncision,
	  description: Joie de l'imposition du nom de Jésus et de la réalisation des prophéties

	- episode: 4D - La présentation au temple ,
	  description: >
    	Douleur pour Joseph d'entendre la prophétie du saint vieillard Siméon,
    	annonçant qu'un glaive percera le coeur de son épouse

	- episode: 4J - La présentation au temple ,
	  description: Joie d'entendre proclamer l'enfant Jésus lumière des nations.

	- episode: 5D - La fuite en Égypte ,
	  description: >
    	Douleur de partir la nuit vers un pays inconnu comme des persécutés,
    	surtout en raison des souffrances occasionnées à Marie et à l'Enfant-Jésus

	- episode: 5J - La fuite en Égypte ,
	  description: >
    	Joie de la protection divine qui les avertit du danger,
    	d'échapper à la cruauté d'Hérode,
    	de demeurer toujours avec Marie et Jésus,
    	et d'apporter la Lumière de la vérité à une nation païenne.

	- episode: 6D - Le retour d’Égypte à Nazareth,
	  description: Douleur de voir l'enfant Jésus méconnu et d'être loin de Bethléem

	- episode: 6J - Le retour d’Égypte à Nazareth,
	  description: Joie de revoir le pays natal et de la vie cachée dans l'intimité familiale

	- episode: 7D - Le recouvrement au temple,
	  description: Douleur de l'angoisse liée à la disparition de Jésus

	- episode: 7J - Le recouvrement au temple,
	  description: Joie de le retrouver enfin au temple parmi les docteurs