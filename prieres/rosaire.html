

<!DOCTYPE html>

<body>
    <main>
        <h1>Chapelet du rosaire</h1>

        
<p>Les 
<a href="/prieres/ex-base.html" class="bleu" target="_blank">prières de base</a>
 sont listées sur une page dédiée.</p>

<p>Je recommande l'application 
<a href="https://rosario.app/" class="bleu" target="_blank">Rosario</a>
 pour la méditation des <b>mystères</b>.</p>

<!-- Base -->


<div id="base">
    <a href="#base">
    
    ===
    
    </a>
</div>


<p>(Signe de croix)</p>

<p>
<label>
    <input type="checkbox" id="b_credo" >
    Credo
</label>
</p>

<p>
<label>
    <input type="checkbox" id="b_pater" >
    Notre Père
</label>
</p>

<p>

<label>
    <input type="checkbox" id="b_ave" >
    3 x Je vous salue Marie
</label>
<br>
(foi, espérance, charité)
</p>

<p>
<label>
    <input type="checkbox" id="b_gloria" >
    Gloire au Père
</label>
</p>

<!-- Mystères -->


<div id="mysteres">
    <a href="#mysteres">
    
    ===
    
    </a>
</div>


<p>
    Mystères

    <select id="sel_type" onchange="selectType();">
        <option>joyeux</option>
        <option>lumineux</option>
        <option>douloureux</option>
        <option>glorieux</option>
    </select>
</p>

<ul class="priere gauche">
    <li>
<input type="radio" name="mysteres" id="m1"  />
<label for="m1" class="mysteres">1. L'annonciation</label>
 </li>
    <li>
<input type="radio" name="mysteres" id="m2"  />
<label for="m2" class="mysteres">2. La visitation</label>
 </li>
    <li>
<input type="radio" name="mysteres" id="m3"  />
<label for="m3" class="mysteres">3. la naissance de Jésus</label>
 </li>
    <li>
<input type="radio" name="mysteres" id="m4"  />
<label for="m4" class="mysteres">4. la présentation de Jésus au temple de Jérusalem</label>
 </li>
    <li>
<input type="radio" name="mysteres" id="m5"  />
<label for="m5" class="mysteres">5. le recouvrement de Jésus au temple de Jérusalem</label>
 </li>
</ul>

<hr />

<p>
<label>
    <input type="checkbox" id="dz_pater" >
    Notre Père
</label>
</p>

<p>10 x Je vous salue Marie</p>

<input type="radio" name="dz_grains" id="dz_grains_1"  />

<input type="radio" name="dz_grains" id="dz_grains_6"  />

<input type="radio" name="dz_grains" id="dz_grains_10"  />

<p>
<label>

    Gloire Père
</label>
</p>
